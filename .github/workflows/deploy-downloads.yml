name: Deploy Downloads to WordPress Server

on:
  push:
    branches: [master]
    paths:
      - 'downloads/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Product Validation
        env:
          CN_API_KEY: ${{ secrets.CN_API_KEY }}
          GLOBAL_API_KEY: ${{ secrets.GLOBAL_API_KEY }}
          CN_XK_TOKEN: ${{ secrets.CN_XK_TOKEN }}
          GLOBAL_XK_TOKEN: ${{ secrets.GLOBAL_XK_TOKEN }}
        run: |
          python validate_products.py --paths downloads/zh downloads/en

      - name: Upload downloads to Cloud Storage
        run: |
          pip install requests
          python scripts/upload_specs_to_cloud.py --dist-dir downloads
