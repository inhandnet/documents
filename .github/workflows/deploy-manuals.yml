name: Deploy Manuals to Formal Server

on:
  pull_request:
    branches: [master]
    paths: ["docs/**"]
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "overrides/**"
      - "mkdocs.yml"
      - "mkdocs.en.yml"
  workflow_dispatch:
    inputs:
      validate_all:
        description: "全量校验（校验 docs/ 下所有文件）"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 1. Upload non-Markdown files to Cloud Storage
      - name: Upload docs files to Cloud Storage
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          PLM_API_ZHENG_ZH_URL: ${{ secrets.PLM_API_ZHENG_ZH_URL }}
          PLM_API_ZHENG_ZH_TOKEN: ${{ secrets.PLM_API_ZHENG_ZH_TOKEN }}
          PLM_API_ZHENG_EN_URL: ${{ secrets.PLM_API_ZHENG_EN_URL }}
          PLM_API_ZHENG_EN_TOKEN: ${{ secrets.PLM_API_ZHENG_EN_TOKEN }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: |
          pip install requests
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "增量上传（只传变更文件）"
            python scripts/upload_specs_to_cloud.py --dist-dir docs --incremental
          else
            echo "全量上传"
            python scripts/upload_specs_to_cloud.py --dist-dir docs
          fi

      # 2. Generate product index pages
      - name: Generate Product Index Pages
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          python scripts/generate_product_index.py --report

      # 3. Build sites
      - name: Build (zh)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          python -m mkdocs build -f mkdocs.yml -d site-zh --clean

      - name: Build (en)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          python -m mkdocs build -f mkdocs.en.yml -d site-en --clean

      # 4. Clean cloud-storage files from build output (keep only site assets)
      - name: Clean cloud-storage files from site output
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          # Remove files served from cloud storage (PDF, CFG, DAT, etc.)
          # Keep HTML/CSS/JS/images/fonts — only files needed by the static site
          for site in site-zh site-en; do
            if [ -d "$site" ]; then
              find "$site" -type f \
                ! -name "*.html" \
                ! -name "*.css" \
                ! -name "*.js" \
                ! -name "*.png" \
                ! -name "*.jpg" \
                ! -name "*.jpeg" \
                ! -name "*.gif" \
                ! -name "*.svg" \
                ! -name "*.webp" \
                ! -name "*.ico" \
                ! -name "*.woff" \
                ! -name "*.woff2" \
                ! -name "*.ttf" \
                ! -name "*.eot" \
                ! -name "*.json" \
                ! -name "*.xml" \
                ! -name "*.txt" \
                -delete
            fi
          done
          echo "Cleaned cloud-storage files from site output"

      # 5. Deploy
      - name: Copy Chinese site to Domestic Server
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CN_OVERSEAS_HOST }}
          username: ${{ secrets.CN_OVERSEAS_USER }}
          password: ${{ secrets.CN_OVERSEAS_PASS }}
          source: "site-zh/*"
          target: /data/wordpress/manuals/
          strip_components: 1
          rm: false
          overwrite: true

      - name: Copy English site to Overseas Server
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OVERSEAS_HOST }}
          username: ${{ secrets.OVERSEAS_USER }}
          password: ${{ secrets.OVERSEAS_PASS }}
          source: "site-en/*"
          target: /data/wordpress/manuals/
          strip_components: 1
          rm: false
          overwrite: true

      - name: Copy English site to Overseas Server (NEW)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OVERSEAS_HOST_NEW }}
          username: ${{ secrets.OVERSEAS_USER }}
          password: ${{ secrets.OVERSEAS_PASS }}
          source: "site-en/*"
          target: /data/wordpress/manuals/
          strip_components: 1
          rm: false
          overwrite: true

      # 6. Sync paths to resource center (validate)
      - name: Sync docs paths
        env:
          PLM_API_ZHENG_ZH_URL: ${{ secrets.PLM_API_ZHENG_ZH_URL }}
          PLM_API_ZHENG_ZH_TOKEN: ${{ secrets.PLM_API_ZHENG_ZH_TOKEN }}
          PLM_API_ZHENG_EN_URL: ${{ secrets.PLM_API_ZHENG_EN_URL }}
          PLM_API_ZHENG_EN_TOKEN: ${{ secrets.PLM_API_ZHENG_EN_TOKEN }}
          NOTIFY_EMAILS: ${{ secrets.NOTIFY_EMAILS }}
        run: |
          pip install requests
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.validate_all }}" = "true" ]; then
            echo "Running full sync (--all)"
            python scripts/validate_docs.py --all
          else
            echo "Running incremental sync (--diff)"
            python scripts/validate_docs.py --diff
          fi

      # 7. Forbid deleted files
      - name: Forbid deleted docs
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          PLM_API_ZHENG_ZH_URL: ${{ secrets.PLM_API_ZHENG_ZH_URL }}
          PLM_API_ZHENG_ZH_TOKEN: ${{ secrets.PLM_API_ZHENG_ZH_TOKEN }}
          PLM_API_ZHENG_EN_URL: ${{ secrets.PLM_API_ZHENG_EN_URL }}
          PLM_API_ZHENG_EN_TOKEN: ${{ secrets.PLM_API_ZHENG_EN_TOKEN }}
          NOTIFY_EMAILS: ${{ secrets.NOTIFY_EMAILS }}
        run: |
          pip install requests
          python scripts/validate_docs.py --forbid-deleted
