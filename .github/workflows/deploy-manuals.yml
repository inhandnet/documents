name: Deploy Manuals to Formal Server

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'overrides/**'
      - 'mkdocs.yml'
      - 'mkdocs.en.yml'
  workflow_dispatch:

permissions:
  contents: read


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Product validation disabled
      # - name: Run Product Validation
      #   env:
      #     CN_API_KEY: ${{ secrets.CN_API_KEY }}
      #     GLOBAL_API_KEY: ${{ secrets.GLOBAL_API_KEY }}
      #     CN_XK_TOKEN: ${{ secrets.CN_XK_TOKEN }}
      #     GLOBAL_XK_TOKEN: ${{ secrets.GLOBAL_XK_TOKEN }}
      #   run: |
      #     python validate_products.py

      - name: Generate Product Index Pages
        run: |
          python scripts/generate_product_index.py --report

      # Build Chinese site to site-zh/
      - name: Build (zh)
        run: |
          python -m mkdocs build -f mkdocs.yml -d site-zh --clean

      # Build English site to site-en/
      - name: Build (en)
        run: |
          python -m mkdocs build -f mkdocs.en.yml -d site-en --clean

      # Deploy Chinese site to domestic server only
      - name: Copy Chinese site to Domestic Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CN_OVERSEAS_HOST }}
          username: ${{ secrets.CN_OVERSEAS_USER }}
          password: ${{ secrets.CN_OVERSEAS_PASS }}
          source: "site-zh/*"
          target: /data/wordpress/manuals/zh/
          strip_components: 1
          rm: false
          overwrite: true

      # Deploy English site to overseas server only
      - name: Copy English site to Overseas Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OVERSEAS_HOST }}
          username: ${{ secrets.OVERSEAS_USER }}
          password: ${{ secrets.OVERSEAS_PASS }}
          source: "site-en/*"
          target: /data/wordpress/manuals/en/
          strip_components: 1
          rm: false
          overwrite: true

