name: Deploy Manuals to Formal Server

on:
  pull_request:
    branches: [master]
    paths: ['docs/**']
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'overrides/**'
      - 'mkdocs.yml'
      - 'mkdocs.en.yml'
  workflow_dispatch:

permissions:
  contents: read


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Upload PDF and other files (excluding .md and images) to Cloud Storage
      - name: Validate docs paths
        run: |
          pip install requests
          python scripts/validate_docs.py --diff

      - name: Upload docs files to Cloud Storage
        if: github.event_name == 'push'
        run: |
          pip install requests
          python scripts/upload_specs_to_cloud.py --dist-dir docs

      - name: Generate Product Index Pages
        if: github.event_name == 'push'
        run: |
          python scripts/generate_product_index.py --report

      # Build Chinese site to site-zh/
      - name: Build (zh)
        if: github.event_name == 'push'
        run: |
          python -m mkdocs build -f mkdocs.yml -d site-zh --clean

      # Build English site to site-en/
      - name: Build (en)
        if: github.event_name == 'push'
        run: |
          python -m mkdocs build -f mkdocs.en.yml -d site-en --clean

      # Deploy Chinese site to domestic server only
      - name: Copy Chinese site to Domestic Server
        if: github.event_name == 'push'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CN_OVERSEAS_HOST }}
          username: ${{ secrets.CN_OVERSEAS_USER }}
          password: ${{ secrets.CN_OVERSEAS_PASS }}
          source: "site-zh/*"
          target: /data/wordpress/manuals/zh/
          strip_components: 1
          rm: false
          overwrite: true

      # Deploy English site to overseas server only
      - name: Copy English site to Overseas Server
        if: github.event_name == 'push'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OVERSEAS_HOST }}
          username: ${{ secrets.OVERSEAS_USER }}
          password: ${{ secrets.OVERSEAS_PASS }}
          source: "site-en/*"
          target: /data/wordpress/manuals/en/
          strip_components: 1
          rm: false
          overwrite: true

