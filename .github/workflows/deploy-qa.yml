name: Deploy QA to Server and Discourse

on:
  push:
    branches: [master]
    paths:
      - 'qa/**'
      - 'overrides/**'
      - 'mkdocs.qa.zh.yml'
      - 'mkdocs.qa.en.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GH_BOT_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install requests pyyaml

      - name: Run Product Validation
        env:
          CN_API_KEY: ${{ secrets.CN_API_KEY }}
          GLOBAL_API_KEY: ${{ secrets.GLOBAL_API_KEY }}
          CN_XK_TOKEN: ${{ secrets.CN_XK_TOKEN }}
          GLOBAL_XK_TOKEN: ${{ secrets.GLOBAL_XK_TOKEN }}
        run: |
          python validate_products.py --paths qa/zh qa/en

      # Build Chinese QA site
      - name: Build QA (zh)
        run: |
          python -m mkdocs build -f mkdocs.qa.zh.yml -d site-qa --clean

      # Build English QA site
      - name: Build QA (en)
        run: |
          python -m mkdocs build -f mkdocs.qa.en.yml -d site-qa/en

      # Deploy disabled - only docs is pushed
      # - name: Copy QA site to Formal Server
      # ...

      # Sync to Discourse disabled
      # - name: Sync to Discourse
      # ...
