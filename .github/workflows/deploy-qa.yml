name: Deploy QA to Server and Discourse

on:
  push:
    branches: [master]
    paths:
      - 'qa/**'
      - 'overrides/**'
      - 'mkdocs.qa.zh.yml'
      - 'mkdocs.qa.en.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GH_BOT_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install requests pyyaml

      - name: Run Product Validation
        env:
          CN_API_KEY: ${{ secrets.CN_API_KEY }}
          GLOBAL_API_KEY: ${{ secrets.GLOBAL_API_KEY }}
          CN_XK_TOKEN: ${{ secrets.CN_XK_TOKEN }}
          GLOBAL_XK_TOKEN: ${{ secrets.GLOBAL_XK_TOKEN }}
        run: |
          python validate_products.py --paths qa/zh qa/en

      # Build Chinese QA site
      - name: Build QA (zh)
        run: |
          python -m mkdocs build -f mkdocs.qa.zh.yml -d site-qa --clean

      # Build English QA site
      - name: Build QA (en)
        run: |
          python -m mkdocs build -f mkdocs.qa.en.yml -d site-qa/en

      # Deploy QA site to overseas server
      - name: Copy QA site to Formal Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OVERSEAS_HOST }}
          username: ${{ secrets.OVERSEAS_USER }}
          password: ${{ secrets.OVERSEAS_PASS }}
          source: "site-qa/*"
          target: "${{ secrets.OVERSEAS_TARGET }}/qa"
          strip_components: 1
          rm: false
          overwrite: true

      # Deploy QA site to domestic server
      - name: Copy QA site to Domestic Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CN_OVERSEAS_HOST }}
          username: ${{ secrets.CN_OVERSEAS_USER }}
          password: ${{ secrets.CN_OVERSEAS_PASS }}
          source: "site-qa/*"
          target: "${{ secrets.OVERSEAS_TARGET }}/qa"
          strip_components: 1
          rm: false
          overwrite: true

      # Sync QA articles to Discourse forum
      - name: Sync to Discourse
        env:
          DISCOURSE_BASE_URL: ${{ secrets.DISCOURSE_BASE_URL }}
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          DISCOURSE_API_USERNAME: ${{ secrets.DISCOURSE_API_USERNAME }}
        run: |
          python scripts/discourse_sync.py
