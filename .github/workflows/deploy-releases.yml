name: Deploy Release Notes to Server

on:
  push:
    branches: [master]
    paths:
      - 'releases/**'
      - 'overrides/**'
      - 'mkdocs.releases.zh.yml'
      - 'mkdocs.releases.en.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Build Chinese Release Notes site
      - name: Build Release Notes (zh)
        run: |
          python -m mkdocs build -f mkdocs.releases.zh.yml -d site-releases --clean

      # Build English Release Notes site
      - name: Build Release Notes (en)
        run: |
          python -m mkdocs build -f mkdocs.releases.en.yml -d site-releases/en

      # Deploy to overseas server
      - name: Copy site to Formal Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OVERSEAS_HOST }}
          username: ${{ secrets.OVERSEAS_USER }}
          password: ${{ secrets.OVERSEAS_PASS }}
          source: "site-releases/*"
          target: "${{ secrets.OVERSEAS_TARGET }}/releases"
          strip_components: 1
          rm: false
          overwrite: true

      # Deploy to domestic server
      - name: Copy site to Domestic Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CN_OVERSEAS_HOST }}
          username: ${{ secrets.CN_OVERSEAS_USER }}
          password: ${{ secrets.CN_OVERSEAS_PASS }}
          source: "site-releases/*"
          target: "${{ secrets.OVERSEAS_TARGET }}/releases"
          strip_components: 1
          rm: false
          overwrite: true
