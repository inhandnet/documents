name: Deploy Specs to WordPress Server

on:
  push:
    branches: [master]
    paths:
      - 'specs/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Run Product Validation
        env:
          CN_API_KEY: ${{ secrets.CN_API_KEY }}
          GLOBAL_API_KEY: ${{ secrets.GLOBAL_API_KEY }}
          CN_XK_TOKEN: ${{ secrets.CN_XK_TOKEN }}
          GLOBAL_XK_TOKEN: ${{ secrets.GLOBAL_XK_TOKEN }}
        run: |
          python validate_products.py --paths specs/zh specs/en

      - name: Install Pandoc & WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
          pip install weasyprint

      - name: Build specs (Markdown → PDF)
        run: |
          python scripts/build_specs.py

