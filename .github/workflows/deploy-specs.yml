name: Deploy Specs to WordPress Server

on:
  push:
    branches: [master]
    paths:
      - 'specs/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Run Product Validation
        env:
          CN_API_KEY: ${{ secrets.CN_API_KEY }}
          GLOBAL_API_KEY: ${{ secrets.GLOBAL_API_KEY }}
          CN_XK_TOKEN: ${{ secrets.CN_XK_TOKEN }}
          GLOBAL_XK_TOKEN: ${{ secrets.GLOBAL_XK_TOKEN }}
        run: |
          python validate_products.py --paths specs/zh specs/en

      - name: Install Pandoc & WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
          pip install weasyprint

      - name: Build specs (Markdown → PDF)
        run: |
          python scripts/build_specs.py

      - name: Upload specs to WordPress Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.WP_HOST }}
          username: ${{ secrets.WP_USER }}
          password: ${{ secrets.WP_PASS }}
          source: "dist/specs/*"
          target: "/var/www/wordpress/wp-content/uploads/resources/specs"
          strip_components: 2
          rm: false
          overwrite: true

      # Optional: Auto-create WordPress resource entries
      # Uncomment when WP REST API integration is ready
      # - name: Sync to WordPress
      #   env:
      #     WP_API_URL: ${{ secrets.WP_API_URL }}
      #     WP_API_USER: ${{ secrets.WP_API_USER }}
      #     WP_API_TOKEN: ${{ secrets.WP_API_TOKEN }}
      #   run: |
      #     python scripts/wp_sync.py specs
