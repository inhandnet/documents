site_name: Release Notes
site_description: Product firmware release notes
site_url: https://inhand.com.cn/releases/en/

repo_url: https://github.com/inhandnet/documents
repo_name: inhandnet/documents
edit_uri: edit/main/releases/en/

docs_dir: releases/en
site_dir: site/releases/en

use_directory_urls: false

exclude_docs: |
  **/images/**/*.md

theme:
  name: material
  language: en
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - scheme: default
      primary: green
      accent: green
    - scheme: slate
      primary: green
      accent: green

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 4
      title: Table of Contents
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      linenums: true
      anchor_linenums: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.mark

plugins:
  - search
