site_name: Developer Portal
site_description: API 文档、MQTT 规范与集成指南
site_url: https://inhand.com.cn/developers/

repo_url: https://github.com/inhandnet/documents
repo_name: inhandnet/documents
edit_uri: edit/main/dev/zh/

docs_dir: dev/zh
site_dir: site/dev

use_directory_urls: false

exclude_docs: |
  **/images/**/*.md

theme:
  name: material
  language: zh
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - scheme: default
      primary: green
      accent: green
    - scheme: slate
      primary: green
      accent: green

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 4
      title: 目录
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      linenums: true
      anchor_linenums: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.mark

plugins:
  - search
