site_name: InHand Documentation
site_description: InHand Networks Product Documentation
site_url: https://inhand.com.cn/docs/en/
# English site will be published under /en (set real URL when deploying)
# site_url: ""

repo_url: https://github.com/inhandnet/documents
repo_name: inhandnet/documents
edit_uri: edit/main/docs/en/

# 方案 B：英文站点使用独立 docs_dir
docs_dir: docs/en

# 输出为 *.html（避免依赖目录 /index.html 的自动补全）
use_directory_urls: false

# Hide image folders (avoid img/ and images/ in nav)
exclude_docs: |
  **/images/**
  **/img/**

theme:
  name: material
  language: en
  custom_dir: overrides
  logo: assets/logo.png
  favicon: assets/logo.png
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.indexes
    - content.code.copy
#    - content.action.edit  # 隐藏编辑按钮（客户视图）
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - scheme: default
      primary: green
      accent: green
    - scheme: slate
      primary: green
      accent: green

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 4
      title: Table of Contents
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      linenums: true
      anchor_linenums: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.mark

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/pdf.js
  - javascripts/embed-bridge.js
  - javascripts/sidebar-search.js
  - javascripts/edit-under-title.js
  - javascripts/toc-h1.js

plugins:
  - search

