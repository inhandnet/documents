site_name: QA 知识库
site_description: 产品常见问题与解答
site_url: https://inhand.com.cn/kb/

repo_url: https://github.com/inhandnet/documents
repo_name: inhandnet/documents
edit_uri: edit/main/qa/zh/

docs_dir: qa/zh

use_directory_urls: false

exclude_docs: |
  **/images/**/*.md

theme:
  name: material
  language: zh
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - scheme: default
      primary: green
      accent: green
    - scheme: slate
      primary: green
      accent: green

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 4
      title: 目录
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      linenums: true
      anchor_linenums: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.mark

plugins:
  - search
  - tags
